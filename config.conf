# ex-logger configuration
# setup.sh がこのファイルを読み込みます

# GPS デバイスのボーレート
GPS_BAUDRATE=9600

# GPS (NMEA via gpsd SHM) による時刻同期を chrony に設定する (true/false)
ENABLE_GPS_TIME_SYNC=true

# PPS による高精度時刻同期を有効にする (true/false)
# Raspberry Pi の GPIO ピンから PPS 信号を受け取る
#ENABLE_PPS=true
#PPS_GPIO_PIN=18

# netmon (ネットワークインタフェースモニタ) を有効にする (true/false)
ENABLE_NETMON=true
# 監視対象インタフェース (スペース区切り)
NETMON_INTERFACES="eth0"

# iperf3 サーバ (連続 JSONL ロガー) を有効にする (true/false)
ENABLE_IPERF3_SRV=true
# iperf3 サーバの待ち受けポート番号
IPERF3_SRV_PORT=5201

# explogger-clt (ステータス API サーバ) を有効にする (true/false)
ENABLE_EXPLOGGER_CLT=true
